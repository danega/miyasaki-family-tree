    --surface: #ffffff;
    --border: #e2ddd6;
    --text: #1a1714;
    --text2: #6b6560;
    --text3: #9b948d;
    --radius: 8px;

    --gen2: #7F77DD;
    --gen3: #1D9E75;
    --gen4: #378ADD;

    :root {
      --bg: #18161380;
      --surface: #222018;
      --border: #3a3730;
      --text: #f0ede8;
      --text2: #a09890;
      --text3: #706860;

  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }
  header { padding: 14px 20px 12px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; position: sticky; top: 0; z-index: 100; }
  .title-block h1 { font-size: 17px; font-weight: 600; letter-spacing: -0.01em; }
  .title-block p { font-size: 12px; color: var(--text2); margin-top: 1px; }
  .controls { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .btn { font-size: 12px; padding: 5px 11px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); color: var(--text); cursor: pointer; white-space: nowrap; }
  .btn:hover { background: var(--bg); }
  #search { font-size: 12px; padding: 5px 10px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); color: var(--text); width: 160px; }
  #search::placeholder { color: var(--text3); }
  #count { font-size: 11px; color: var(--text3); }
  #legend { display: flex; gap: 14px; flex-wrap: wrap; padding: 8px 20px; background: var(--surface); border-bottom: 1px solid var(--border); font-size: 11px; color: var(--text2); }
  .leg { display: flex; align-items: center; gap: 5px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  #wrap { flex: 1; overflow: auto; position: relative; }
  svg#tree { display: block; cursor: grab; }
  svg#tree:active { cursor: grabbing; }
  .link { fill: none; }
  .node-g { cursor: pointer; }
  .node-g:hover rect { filter: brightness(0.91); }
  #tooltip { position: fixed; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 9px 13px; font-size: 12px; color: var(--text); pointer-events: none; display: none; max-width: 210px; z-index: 9999; line-height: 1.55; box-shadow: 0 4px 16px rgba(0,0,0,0.12); }
  #tooltip strong { display: block; margin-bottom: 2px; font-size: 13px; }
  #tooltip .tt-dates { color: var(--text2); font-size: 11px; }
  #tooltip .tt-note { color: var(--text3); font-size: 11px; font-style: italic; margin-top: 3px; }
  #tooltip .tt-hint { color: var(--text3); font-size: 11px; margin-top: 4px; }
  footer { padding: 10px 20px; font-size: 11px; color: var(--text3); background: var(--surface); border-top: 1px solid var(--border); }
</style>
</head>

const byId = {};
RAW.forEach(p => { byId[p.id] = p; });

const collapsed = new Set();

function shortName(name) {
  if (name.length <= 19) return name;
  const parts = name.split(' ');
  if (parts.length >= 2) {
    const first = parts[0];
    const last = parts[parts.length - 1];
    const mid = parts.length > 2 ? ' ' + parts[1][0] + '.' : '';
    const attempt = first + mid + ' ' + last;
    return attempt.length <= 20 ? attempt : first + ' ' + last;
  }
  return name.substring(0, 19);
}

function buildTree() {
  const svg = d3.select('svg#tree');
  svg.selectAll('*').remove();

  const g = svg.append('g').attr('class', 'zoom-g');
  const zoom = d3.zoom().scaleExtent([0.1, 2.5]).on('zoom', e => g.attr('transform', e.transform));
  svg.call(zoom);
  window._zoom = zoom; window._svg = svg;

  const branches = ['mary','jack_nii','chiyo','jane','john','lily'];
  const BRANCH_GAP = 55;
  let allNodes = [], allLinks = [];
  let curX = 20;
  const gen2Y = 10 + YGEN;

  branches.forEach(brId => {
    const root = byId[brId];
    const spouse = root.spouse ? byId[root.spouse] : null;
    const isCollapsed = collapsed.has(brId);
    const nodeX = curX;
    const spouseX = nodeX + W + 8;

    allNodes.push({ ...root, x: nodeX, y: gen2Y, branchRoot: true });
    if (spouse) allNodes.push({ ...spouse, x: spouseX, y: gen2Y });

    if (!isCollapsed) {
      const children = root.children || [];
      let childX = curX;

      children.forEach(cid => {
        const child = byId[cid];
        if (!child) return;
        const cspouse = child.spouse ? byId[child.spouse] : null;
        const cIsCollapsed = collapsed.has(cid);
        const cY = gen2Y + YGEN;

        allNodes.push({ ...child, x: childX, y: cY });
        allLinks.push({ x1: nodeX + W/2, y1: gen2Y + H, x2: childX + W/2, y2: cY });
        if (cspouse) allNodes.push({ ...cspouse, x: childX + W + 8, y: cY });

        let janLemanX = childX + W * 3 + 30;

        if (!cIsCollapsed) {
          const grandkids = child.children || [];
          let gkX = childX;

          if (child.id === 'ed_k') {
            const jan = byId['jan_k'];
            const lemans = ['katie_l','kori_l'];
            let lX = childX + (W + 8) * 2 + 20;
            lemans.forEach(lid => {
              const lp = byId[lid]; if (!lp) return;
              const lY = cY + YGEN;
              allNodes.push({ ...lp, x: lX, y: lY });
              allLinks.push({ x1: childX + W + 8 + W/2, y1: cY + H, x2: lX + W/2, y2: lY, dash: true });
              const lsp = lp.spouse ? byId[lp.spouse] : null;
              if (lsp) allNodes.push({ ...lsp, x: lX + W + 8, y: lY });
              const lgks = lp.children || [];
              lgks.forEach((lgkid, li) => {
                const lgk = byId[lgkid]; if (!lgk) return;
                allNodes.push({ ...lgk, x: lX + li * (W + 5), y: lY + YGEN });
                allLinks.push({ x1: lX + W/2, y1: lY + H, x2: lX + li * (W + 5) + W/2, y2: lY + YGEN });
              });
              lX += (W + 8) * 2 + 10;
              janLemanX = lX;
            });
          }

          grandkids.forEach(gkid => {
            const gk = byId[gkid]; if (!gk) return;
            const gkIsCollapsed = collapsed.has(gkid);
            const gkY = cY + YGEN;
            allNodes.push({ ...gk, x: gkX, y: gkY });
            allLinks.push({ x1: childX + W/2, y1: cY + H, x2: gkX + W/2, y2: gkY });
            const gksp = gk.spouse ? byId[gk.spouse] : null;
            if (gksp) allNodes.push({ ...gksp, x: gkX + W + 8, y: gkY });

            if (!gkIsCollapsed) {
              const ggks = gk.children || [];
              ggks.forEach((ggkid, ggi) => {
                const ggk = byId[ggkid]; if (!ggk) return;
                allNodes.push({ ...ggk, x: gkX + ggi * (W + 4), y: gkY + YGEN });
                allLinks.push({ x1: gkX + W/2, y1: gkY + H, x2: gkX + ggi * (W + 4) + W/2, y2: gkY + YGEN });
              });
              gkX += Math.max(W + 20, (gk.children || []).length * (W + 4) + 10);
            } else {
              gkX += W + 20;
            }
          });

          childX = Math.max(gkX, childX + W + 20);
        } else {
          childX += W + 20;
        }

        childX += BRANCH_GAP / 2;
      });

      curX = Math.max(curX + W * 2 + BRANCH_GAP, childX + BRANCH_GAP / 2);
    } else {
      curX += W * 2 + 30 + BRANCH_GAP;
    }
  });

  const gen1Y = 10;
  const kuniX = Math.max(20, curX / 2 - W - 10);
  const sonoX = kuniX + W + 10;
  allNodes.unshift({ ...byId['sono'], x: sonoX, y: gen1Y });
  allNodes.unshift({ ...byId['kunihei'], x: kuniX, y: gen1Y });

  const midX = kuniX + W + 5;
  const gen2Starts = [];
  let bx = 20;
  branches.forEach(brId => {
    gen2Starts.push(bx + W/2);
    bx += (collapsed.has(brId) ? W*2+30 : W*2) + BRANCH_GAP;
  });

  gen2Starts.forEach(gx => {
    allLinks.unshift({ x1: midX, y1: gen1Y + H, x2: gx, y2: gen2Y });
  });

  const totalW = curX + 30;
  const totalH = gen1Y + YGEN * 5 + H + 50;
  svg.attr('width', totalW).attr('height', totalH);

  g.selectAll('.link').data(allLinks).join('line')
    .attr('class', 'link')
    .attr('x1', d => d.x1).attr('y1', d => d.y1)
    .attr('x2', d => d.x2).attr('y2', d => d.y2)
    .attr('stroke', d => d.dash ? '#aaa' : '#ccc')
    .attr('stroke-width', d => d.dash ? 0.8 : 1.2)
    .attr('stroke-dasharray', d => d.dash ? '4,3' : 'none');

  const seen = new Set();
  const uniq = allNodes.filter(n => { if (seen.has(n.id)) return false; seen.add(n.id); return true; });

  document.getElementById('count').textContent = uniq.length + ' individuals';

  const tt = document.getElementById('tooltip');
  const nodeGs = g.selectAll('.node-g').data(uniq, d => d.id).join('g')
    .attr('class', 'node-g')
    .attr('transform', d => `translate(${d.x},${d.y})`)
    .on('click', (e, d) => {
      e.stopPropagation();
      if (d.children && d.children.length) {
        if (collapsed.has(d.id)) collapsed.delete(d.id);
        else collapsed.add(d.id);
        buildTree();
      }
    })
    .on('mouseover', (e, d) => {
      let html = `<strong>${d.name}</strong>`;
      const dates = [d.b && `b. ${d.b}`, d.d && `d. ${d.d}`].filter(Boolean);
      if (dates.length) html += `<div class="tt-dates">${dates.join(' · ')}</div>`;
      if (d.notes) html += `<div class="tt-note">${d.notes}</div>`;
      if (d.children && d.children.length) html += `<div class="tt-hint">${collapsed.has(d.id) ? '▶ Click to expand' : '▼ Click to collapse'}</div>`;
      tt.innerHTML = html;
      tt.style.display = 'block';
      tt.style.left = (e.clientX + 14) + 'px';
      tt.style.top = (e.clientY - 10) + 'px';
    })
    .on('mousemove', e => { tt.style.left = (e.clientX + 14) + 'px'; tt.style.top = (e.clientY - 10) + 'px'; })
    .on('mouseout', () => { tt.style.display = 'none'; });

  nodeGs.append('rect')
    .attr('width', W).attr('height', H).attr('rx', 6)
    .attr('fill', d => GEN_COLORS[d.gen] || '#888780')
    .attr('opacity', d => d.gen === -1 ? 0.55 : 1);

  nodeGs.append('text')
    .attr('x', W/2).attr('y', H/2 - 5)
    .attr('text-anchor', 'middle').attr('dominant-baseline', 'middle')
    .attr('fill', 'white').attr('font-size', '10.5px').attr('font-weight', '500')
    .attr('pointer-events', 'none')
    .text(d => shortName(d.name));

  nodeGs.append('text')
    .attr('x', W/2).attr('y', H - 8)
    .attr('text-anchor', 'middle')
    .attr('fill', 'rgba(255,255,255,0.72)').attr('font-size', '9px')
    .attr('pointer-events', 'none')
    .text(d => {
      const parts = [];
      if (d.b) parts.push(d.b);
      if (d.d) parts.push('d.' + d.d);
      return parts.join(' · ');
    });

  nodeGs.filter(d => d.children && d.children.length).append('text')
    .attr('x', W - 5).attr('y', 9)
    .attr('text-anchor', 'middle').attr('fill', 'rgba(255,255,255,0.85)').attr('font-size', '9px')
    .attr('pointer-events', 'none')
    .text(d => collapsed.has(d.id) ? '▶' : '▼');

  window._allNodes = uniq;
}

window.expandAll = () => { collapsed.clear(); buildTree(); };
window.collapseAll = () => {
  ['mary','jack_nii','chiyo','jane','john','lily','jean','nadine','julie_t','stanley','mark_a','ken_k','joyce','ed_k','gail_k','karen_k','gwendy','tammy','meri','greg_f','glenn','melanie','jenny_l','daniel_b','clinton','emmett','marcus','kenji'].forEach(id => collapsed.add(id));
  buildTree();
};
window.resetZoom = () => {
  window._svg.transition().duration(450).call(window._zoom.transform, d3.zoomIdentity.translate(16, 16).scale(0.55));
};
window.searchNode = q => {
  const ql = q.toLowerCase();
  d3.selectAll('.node-g').each(function(d) {
    const match = !q || d.name.toLowerCase().includes(ql);
    d3.select(this).selectAll('rect, text').attr('opacity', match ? null : 0.15);
  });
};

buildTree();
setTimeout(resetZoom, 150);
</script>
</body>
</html>
